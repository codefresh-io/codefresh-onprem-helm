apiVersion: v2
description: Helm Chart for Codefresh On-Prem
name: codefresh
version: 2.10.10
keywords:
  - codefresh
home: https://codefresh.io/
icon: https://avatars1.githubusercontent.com/u/11412079?v=3
sources:
  - https://github.com/codefresh-io/codefresh-onprem-helm
maintainers:
  - name: codefresh
    url: https://codefresh-io.github.io/
appVersion: 0.0.0
annotations:
  artifacthub.io/prerelease: "false"
  artifacthub.io/alternativeName: "codefresh-onprem"
  artifacthub.io/containsSecurityUpdates: "true"
  # supported kinds are added, changed, deprecated, removed, fixed and security.
  # artifacthub.io/changes: |
  #   - kind:
  #     description: ""
  artifacthub.io/changes: |-
    - kind: changed
      description: 'Update "helm-repo-manager" to 0.23.3.'
    - kind: security
      description: 'Fix various security vulnerabilities in "helm-repo-manager".'
    - kind: changed
      description: 'Update "cf-broadcaster" to 1.14.7.'
    - kind: security
      description: 'Fix various security vulnerabilities in "cf-broadcaster".'
    - kind: changed
      description: 'Update "nomios" to 0.11.15.'
    - kind: security
      description: 'Fix various security vulnerabilities in "nomios".'
    - kind: changed
      description: 'Update "hermes" to 0.21.26.'
    - kind: security
      description: 'Migrate "hermes" to DHI'
    - kind: changed
      description: 'Update "cf-api" to 21.293.12.'
    - kind: security
      description: 'Fix various security vulnerabilities in "cf-api".'
    - kind: changed
      description: 'Update "cronus" to 0.8.15.'
    - kind: security
      description: 'Fix various security vulnerabilities in "cronus".'
    - kind: changed
      description: 'Update "context-manager" to 2.37.6.'
    - kind: security
      description: 'Fix various security vulnerabilities in "context-manager".'
    - kind: changed
      description: 'Update "charts-manager" to 1.26.6.'
    - kind: security
      description: 'Fix various security vulnerabilities in "charts-manager".'
    - kind: changed
      description: 'Update "cluster-providers" to 1.19.6.'
    - kind: security
      description: 'Fix various security vulnerabilities in "cluster-providers".'
    - kind: changed
      description: 'Update "engine" to 3.2.0.'
    - kind: changed
      description: 'Update engine to support a brand new API token authorization for Bitbucket Cloud.'
    - kind: changed
      description: 'Update "compose" to 5.0.1-1.6.1.'
    - kind: security
      description: 'Fix various security vulnerabilities in "compose".'
    - kind: changed
      description: 'Update "pikolo" to 0.14.10.'
    - kind: security
      description: 'Fix various security vulnerabilities in "pikolo".'
    - kind: changed
      description: 'Update "argo-platform" to 1.3978.4-onprem-809c5dc.'
    - kind: security
      description: 'Fix various security vulnerabilities in "argo-platform".'
