mongodb:
  config:
    net:
      tls:
        mode: allowTLS
        certificateKeyFile: /etc/ssl/server.pem
        CAFile: /etc/ssl/ca.crt

  container:
    volumeMounts:
      ca-cert:
        path:
          - mountPath: /etc/ssl/ca.crt
            subPath: ca.crt
      server-cert:
        path:
          - mountPath: /etc/ssl/server.pem
            subPath: server.pem

  volumes:
    ca-cert:
      enabled: true
      optional: true
      type: secret
      nameOverride: mongodb-ca-cert
    server-cert:
      enabled: true
      optional: true
      type: secret
      nameOverride: mongodb-server-cert

  secrets:
    ca-cert:
      enabled: true
      data:
        ca.crt: ""
    server-cert:
      enabled: true
      data:
        server.pem: ""
    client-cert:
      enabled: true
      data:
        client.pem: ""
